spring.application.name=invoice-payment-system

# ---------------------------------------------------------------------------
# Database (PostgreSQL)
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/invoice_db
spring.datasource.username=shivanialwal
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# dialect auto-detected by Hibernate for PostgreSQL — no need to set explicitly
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------------
# Mail (payment reminders)
# ---------------------------------------------------------------------------
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=your_mail_username
spring.mail.password=your_mail_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=noreply@example.com

# ---------------------------------------------------------------------------
# Razorpay
# ---------------------------------------------------------------------------
razorpay.key-id=your_razorpay_key_id
razorpay.key-secret=your_razorpay_key_secret
razorpay.webhook-secret=your_razorpay_webhook_secret

# ---------------------------------------------------------------------------
# UPI
# ---------------------------------------------------------------------------
upi.merchant-vpa=your_merchant@upi
upi.merchant-name=Your Business Name

# ---------------------------------------------------------------------------
# Anthropic (AI invoice line items)
# ---------------------------------------------------------------------------
anthropic.api-key=your_anthropic_api_key
anthropic.model=claude-sonnet-4-20250514
anthropic.api-url=https://api.anthropic.com/v1/messages
